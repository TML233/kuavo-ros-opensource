# RL控制器列表配置文件
# 定义该版本机器人需要加载的RL控制器
# class: 控制器大类，可选值：BASE_CONTROLLER, FALL_STAND_CONTROLLER
# type: 具体控制器类型，可选值：MPC, AMP_CONTROLLER, FALL_STAND_CONTROLLER

controllers:
  # - name: "fall_stand_controller"
  #   class: "FALL_STAND_CONTROLLER"  # 倒地起身控制器
  #   type: "FALL_STAND_CONTROLLER"   # 具体控制器类型
  #   config_file: "rl/fall_stand_param.info"  # 相对于版本配置目录的路径
  #   enabled: true  # 是否启用该控制器
  - name: "amp_controller"
    class: "BASE_CONTROLLER"  # 基础行走控制器
    type: "AMP_CONTROLLER"    # 具体控制器类型
    config_file: "rl/amp_param.info" 
    enabled: true  

  - name: "dance_balei"          # 芭蕾
    class: "DANCE_CONTROLLER"
    type: "DANCE_CONTROLLER"
    config_file: "rl/dance_param_balei.info"
    enabled: true

  - name: "dance_xinjiang"       # 新疆舞
    class: "DANCE_CONTROLLER"
    type: "DANCE_CONTROLLER"
    config_file: "rl/dance_param_xinjiang.info"
    enabled: true

  - name: "dance_aiqingniao"     # 爱情鸟
    class: "DANCE_CONTROLLER"
    type: "DANCE_CONTROLLER"
    config_file: "rl/dance_param_aiqingniao.info"
    enabled: true

  # - name: "dance_parapara"       # 芭啦芭啦樱之舞
  #   class: "DANCE_CONTROLLER"
  #   type: "DANCE_CONTROLLER"
  #   config_file: "rl/dance_param_parapara.info"
  #   enabled: true

  - name: "dance_lonelydance"    # lonelydance
    class: "DANCE_CONTROLLER"
    type: "DANCE_CONTROLLER"
    config_file: "rl/dance_param_lonelydance.info"
    enabled: true
